experiment:
  name: openthoughts_trace_replacement_action_conditioned_jepa
  seed: 31
  device: auto
task:
  name: openthoughts
  seed: 31
  seq_len: 256
  prompt_tokens: 64
  tokenizer_name: gpt2
  streaming: true
  max_examples: 100000
corruptor:
  name: replacement
  num_steps: 16
  schedule: cosine
model:
  type: seq_edit_jepa
  hidden_size: 768
  intermediate_size: 3072
  encoder_layers: 10
  policy_layers: 2
  predictor_layers: 12
  num_heads: 12
  dropout: 0.1
  action_conditioned: true
  action_conditioning: concat
  predictor_type: transformer
  lambda_act: 1.0
  lambda_dyn: 1.0
  lambda_tok: 0.3
  lambda_sig: 0.02
training:
  batch_size: 32
  max_steps: 50000
  lr: 0.00015
  weight_decay: 0.01
  grad_clip: 1.0
  log_every: 100
  amp: true
eval:
  batches: 16
  batch_size: 32
  rollout_steps: [2]
  rollout_batches: 2
debug:
  enabled: true
  every_steps: 500
  rollout_steps: 1
  max_actions: 24
hydra:
  run:
    dir: ${oc.env:SEQ_EDIT_JEPA_WORK_ROOT}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  output_subdir: null
