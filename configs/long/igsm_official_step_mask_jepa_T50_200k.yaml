experiment:
  name: igsm_official_med_step_mask_jepa_T50_200k
  seed: 41
  device: auto
task:
  name: official_igsm
  seed: 41
  eval_seed: 1041
  ood_seed: 7041
  seq_len: 1024
  max_length: 1024
  difficulty: med
  max_op: 15
  max_edge: 20
  perm_level: 5
  detail_level: 0
  p_format: pq
  compact_vocab: true
  compact_vocab_num_prescan_examples: 0
  builder_examples: 1024
  official_repo_path: ${oc.env:SEQ_EDIT_JEPA_WORK_ROOT}/external/iGSM
corruptor:
  name: mask
  target_mode: step
  num_steps: 50
  schedule: cosine
model:
  type: seq_edit_jepa
  hidden_size: 256
  intermediate_size: 1024
  encoder_layers: 6
  policy_layers: 2
  predictor_layers: 12
  num_heads: 8
  dropout: 0.1
  action_conditioned: true
  action_conditioning: concat
  predictor_type: transformer
  lambda_act: 1.0
  lambda_dyn: 1.0
  lambda_tok: 0.5
  lambda_sig: 0.05
training:
  batch_size: 16
  max_steps: 200000
  save_steps: 20000
  save_total_limit: 5
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  log_every: 500
  bf16: true
eval:
  one_step: true
  full_denoise: true
  jepa_inference_mode: predictor_decoder
  commit_k: schedule
  batches: 16
  batch_size: 8
  every_steps: 50000
  periodic_batches: 4
  extra_splits:
  - name: ood_op_20
    split: eval_op_20
    batches: 16
    periodic_batches: 4
  - name: ood_op_21
    split: eval_op_21
    batches: 16
    periodic_batches: 4
  - name: ood_op_22
    split: eval_op_22
    batches: 16
    periodic_batches: 4
  - name: ood_op_23
    split: eval_op_23
    batches: 16
    periodic_batches: 4
  sample_generations:
    enabled: true
    examples: 1
    splits:
    - eval
    - eval_op_20
    - eval_op_21
    - eval_op_22
    - eval_op_23
    every_steps: 50000
    trace_steps:
    - 50
    - 25
    - 12
    - 1
    max_chars: 1600
debug:
  enabled: true
  every_steps: 10000
  rollout_steps: 4
  max_actions: 24
hydra:
  run:
    dir: ${oc.env:SEQ_EDIT_JEPA_WORK_ROOT}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  output_subdir: null
