defaults:
  - data: semantic_mix
  - model: cls64_r1
  - objective: base
  - _self_

seed: 1707
device: auto
run_name: ${data.name}_${model.name}_${objective.name}_seed${seed}
output_dir: ${oc.env:PUZZLE_JEPA_WORK_ROOT}/runs/object_dynamics/${run_name}

training:
  max_steps: 2000
  batch_size: 64
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  bf16: true
  eval_every_steps: 250
  save_every_steps: 2000

eval:
  run_initial_probes: true
  probe_trajectory_kind: semantic_mix
  probe_train_samples: 512
  probe_eval_samples: 256
  probe_batch_size: 64
  probe_steps: 150
  probe_learning_rate: 1.0e-2
