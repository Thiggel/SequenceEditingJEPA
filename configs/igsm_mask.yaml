experiment:
  name: igsm_mask_action_conditioned_jepa
  seed: 13
  device: auto
task:
  name: igsm
  seed: 13
  seq_len: 256
  max_abs_value: 512
  num_registers: 3
  train_min_ops: 1
  train_max_ops: 15
  eval_min_ops: 1
  eval_max_ops: 15
  ood_op_values:
  - 20
  - 21
  - 22
  - 23
  modulus: 23
  ood_modulus: 23
corruptor:
  name: mask
  num_steps: 16
  schedule: cosine
model:
  type: seq_edit_jepa
  hidden_size: 256
  intermediate_size: 1024
  encoder_layers: 6
  policy_layers: 2
  predictor_layers: 12
  num_heads: 8
  dropout: 0.1
  action_conditioned: true
  action_conditioning: concat
  predictor_type: transformer
  lambda_act: 1.0
  lambda_dyn: 1.0
  lambda_tok: 0.5
  lambda_sig: 0.05
training:
  batch_size: 128
  max_steps: 10000
  save_steps: 1000
  save_total_limit: 3
  lr: 0.0003
  weight_decay: 0.01
  grad_clip: 1.0
  log_every: 100
  bf16: true
eval:
  batches: 32
  batch_size: 128
  rollout_steps:
  - 2
  - 4
  rollout_batches: 4
  every_steps: 10000
  periodic_batches: 4
  extra_splits:
  - name: ood_ops
    split: eval_ood
    batches: 64
    periodic_batches: 8
    rollout_steps: []
debug:
  enabled: true
  every_steps: 500
  rollout_steps: 2
  max_actions: 24
hydra:
  run:
    dir: ${oc.env:SEQ_EDIT_JEPA_WORK_ROOT}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
  output_subdir: null
