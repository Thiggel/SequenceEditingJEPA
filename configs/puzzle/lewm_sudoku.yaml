seed: 2001
output_dir: ${oc.env:PUZZLE_JEPA_WORK_ROOT}/runs/lewm_sudoku
task:
  name: sudoku
  repo_id: sapientinc/sudoku-extreme
  train_split: train[:50000]
  eval_split: test[:1024]
  train_limit: null
  eval_limit: null
  puzzle_column: question
  solution_column: answer
model:
  d_model: 128
  latent_dim: 128
  encoder_layers: 6
  predictor_layers: 6
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.1
  action_component_dim: 8
  action_dim: 32
  max_history: 82
  projector_hidden_dim: 2048
  sigreg_knots: 17
  sigreg_projections: 1024
  sigreg_weight: 0.1
  value_weight: 1.0
  stop_gradient_target: false
training:
  max_steps: 20000
  batch_size: 128
  num_frames: null
  oracle_probability: 0.5
  learning_rate: 5.0e-5
  weight_decay: 1.0e-3
  grad_clip: 1.0
  bf16: true
  eval_every_steps: 1000
  save_every_steps: 5000
eval:
  batch_size: 128
  oracle_probability: 1.0
  latent_examples: 128
  trajectory_examples: 32
  rank_examples: 16
  panel_examples: 3
  panel_steps: 5
  panel_actions: 6
  projection_horizons: [1, 4, 8, 16, 32, 64]
  write_diagnostic_plots: true
  run_planner_matrix: true
  fast_planner_matrix: true
  planner_examples: 4
  max_plan_steps: 81
