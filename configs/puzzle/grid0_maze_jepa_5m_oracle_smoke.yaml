seed: 103
output_dir: ${oc.env:PUZZLE_JEPA_WORK_ROOT}/runs/grid0_maze_jepa_5m_oracle_smoke
task:
  name: maze
  repo_id: sapientinc/maze-30x30-hard-1k
  train_split: train
  eval_split: test
  puzzle_column: question
  solution_column: answer
  height: 30
  width: 30
model:
  hidden_size: 256
  intermediate_size: 512
  encoder_layers: 5
  predictor_layers: 3
  num_heads: 8
  max_height: 30
  max_width: 30
  task_vocab_size: 2
  action_value_vocab_size: 5
  dropout: 0.0
  target_momentum: 0.99
training:
  max_steps: 1000
  batch_size: 16
  learning_rate: 1.0e-4
  weight_decay: 0.05
  grad_clip: 1.0
  bf16: true
  eval_every_steps: 250
  save_every_steps: 250
eval:
  num_batches: 1
  batch_size: 16
  rank_examples: 2
  planning_examples: 1
  max_plan_steps: 32
