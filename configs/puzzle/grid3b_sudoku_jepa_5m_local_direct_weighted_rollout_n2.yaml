seed: 501
output_dir: ${oc.env:PUZZLE_JEPA_WORK_ROOT}/runs/sudoku_jepa_5m_local_direct_weighted_rollout_n2
data:
  oracle_probability: 0.5
task:
  name: sudoku
  repo_id: sapientinc/sudoku-extreme
  train_split: train[:50000]
  eval_split: test[:1024]
  puzzle_column: question
  solution_column: answer
model:
  hidden_size: 256
  intermediate_size: 512
  encoder_layers: 5
  predictor_layers: 3
  num_heads: 8
  max_height: 9
  max_width: 9
  task_vocab_size: 2
  action_value_vocab_size: 10
  dropout: 0.0
  target_momentum: 0.99
  use_task_embedding: false
  use_selected_cell_marker: false
  action_injection: local_value
  predict_residual: false
training:
  max_steps: 5000
  batch_size: 768
  rollout_steps: 2
  rollout_batch_size: 512
  rollout_weight: 1.0
  loss_weighting: local_context
  changed_cell_weight: 8.0
  context_cell_weight: 2.0
  base_cell_weight: 1.0
  learning_rate: 1.0e-4
  weight_decay: 0.05
  grad_clip: 1.0
  bf16: true
  eval_every_steps: 1000
  save_every_steps: 1000
eval:
  oracle_probability: 1.0
  num_batches: 2
  batch_size: 128
  rank_examples: 16
  planning_examples: 8
  max_plan_steps: 64
  planning_horizons: [1, 2, 4]
  planning_branching: 4
  distance_examples: 16
