seed: 914
output_dir: ${oc.env:PUZZLE_JEPA_WORK_ROOT}/runs/sudoku_jepa_5m_global_mlp_l3_mixed_hierarchy_span4
data:
  oracle_probability: 0.5
task:
  name: sudoku
  repo_id: sapientinc/sudoku-extreme
  train_split: train[:50000]
  eval_split: test[:1024]
  puzzle_column: question
  solution_column: answer
model:
  encoder_type: global_mlp
  hidden_size: 256
  intermediate_size: 512
  encoder_layers: 3
  predictor_layers: 3
  num_heads: 1
  max_height: 9
  max_width: 9
  task_vocab_size: 2
  action_value_vocab_size: 10
  action_embedding_dim: 32
  dropout: 0.0
  target_momentum: 0.99
  use_task_embedding: false
  use_selected_cell_marker: false
  action_injection: global
  predict_residual: false
  use_cls_token: false
  use_goal_energy_head: true
  hierarchy_levels: 3
  hierarchy_span: 4
  macro_action_dim: 32
training:
  max_steps: 5000
  batch_size: 768
  rollout_steps: 2
  rollout_batch_size: 512
  rollout_oracle_probability: 0.5
  rollout_weight: 1.0
  goal_energy_weight: 1.0
  hierarchy_weight: 1.0
  hierarchy_rollout_steps: 16
  hierarchy_batch_size: 256
  hierarchy_oracle_probability: 0.5
  loss_weighting: uniform
  learning_rate: 1.0e-4
  weight_decay: 0.05
  grad_clip: 1.0
  bf16: true
  eval_every_steps: 1000
  save_every_steps: 1000
eval:
  oracle_probability: 1.0
  num_batches: 2
  batch_size: 128
  rank_examples: 16
  planning_examples: 8
  max_plan_steps: 64
  planning_horizons: [1, 2, 4]
  planning_branching: 4
  distance_examples: 16
  goal_energy_examples: 32
