seed: 12001
output_dir: ${oc.env:PUZZLE_JEPA_WORK_ROOT}/runs/grid6_trajectory_default
task:
  name: sudoku
  repo_id: sapientinc/sudoku-extreme
  train_split: train[:50000]
  eval_split: test[:1024]
  puzzle_column: question
  solution_column: answer
model:
  d_model: 320
  board_hidden_size: 1280
  action_dim: 32
  encoder_layers: 4
  predictor_layers: 4
  action_chunk_layers: 2
  num_heads: 8
  intermediate_size: 1280
  max_height: 9
  max_width: 9
  action_value_vocab_size: 10
  max_sequence_steps: 33
  max_horizon: 16
  horizons: [1]
  dropout: 0.0
  stabilizer_type: sigreg
  sigreg_weight: 1.0
  sigreg_projections: 64
  sigreg_knots: 16
  sigreg_knot_max: 5.0
  vicreg_variance_weight: 1.0
  vicreg_covariance_weight: 0.04
  target_encoder_momentum: 0.99
training:
  max_steps: 5000
  batch_size: 192
  rollout_steps: 32
  rollout_oracle_probability: 0.5
  goal_energy_weight: 1.0
  learning_rate: 1.0e-4
  weight_decay: 0.05
  grad_clip: 1.0
  bf16: true
  eval_every_steps: 1000
  save_every_steps: 1000
eval:
  batch_size: 64
  rollout_oracle_probability: 1.0
