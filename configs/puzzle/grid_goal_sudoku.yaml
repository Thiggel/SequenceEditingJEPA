seed: 3001
ablation: M0_full
output_dir: ${oc.env:PUZZLE_JEPA_WORK_ROOT}/runs/grid_goal_sudoku
task:
  name: sudoku
  repo_id: sapientinc/sudoku-extreme
  train_split: train[:50000]
  eval_split: test[:1024]
  train_limit: null
  eval_limit: null
  puzzle_column: question
  solution_column: answer
model:
  d_model: 256
  distance_dim: 128
  context_layers: 4
  state_layers: 6
  predictor_layers: 4
  goal_layers: 6
  num_heads: 8
  mlp_ratio: 4.0
  dropout: 0.0
  sigreg_weight: 0.1
  goal_mse_weight: 1.0
  goal_nce_weight: 0.1
  goal_distance_field_weight: 0.0
  goal_target_mode: target_stopgrad
  dynamics_target_mode: target_stopgrad
  counterfactual_dynamics_weight: 0.0
  delta_action_weight: 0.0
  delta_action_horizons: [1]
  delta_action_mode: ordered
  delta_action_decoder_layers: 3
  delta_action_max_steps: 16
  progress_rank_weight: 1.0
  action_rank_weight: 1.0
  temporal_straightening_weight: 0.1
  terminal_corrupt_weight: 1.0
  progress_margin: 0.1
  rank_margin: 0.1
  rank_temperature: 0.1
  multi_step_horizons: [1, 4, 8, 16]
  dense_future_weight: 0.0
  dense_rollout_all_steps: false
  dense_rollout_variable_starts: false
  dense_rollout_refactor_mode: none
  dense_rollout_weighting: inverse_sqrt
  dense_rollout_gamma: 0.95
  rollout_detach_interval: 0
  hierarchy_levels: []
  hierarchy_loss_weight: 0.0
  hierarchy_dense_future_weight: 0.0
  macro_action_encoder_layers: 1
  macro_action_dim: 0
  shared_hierarchy_predictor: false
  goal_conditioning: initial_current
  goal_conditioning_detach_state: false
  waypoint_horizons: []
  waypoint_loss_weight: 0.0
  waypoint_final_weight: 0.0
  progress_rank_target: predicted
  action_rank_mode: pairwise
  action_rank_target: predicted
  listwise_action_rank_max_actions: 729
  policy_prior_weight: 0.0
  policy_prior_mode: pairwise
  policy_prior_planning_weight: 0.0
  metric_geometry_mode: none
  metric_geometry_weight: 0.0
  metric_goal_mse_weight: 0.0
  metric_asymmetric_projection: false
  metric_bad_margin_weight: 0.0
  metric_bad_margin: 1.0
  metric_hindsight_max_horizon: 8
  metric_contrastive_temperature: 0.1
  metric_distance_type: euclidean
  metric_iql_gamma: 0.98
  metric_iql_expectile: 0.8
  bad_state_weight: 0.0
  bad_state_planning_weight: 0.0
  compatibility_weight: 0.0
  remaining_weight: 0.0
  verifier_predicted_weight: 0.0
  verifier_predicted_horizons: [1]
  verifier_corruption_weight: 0.0
  verifier_rank_weight: 0.0
  verifier_rank_mode: pairwise
  verifier_energy_projection: none
  verifier_score_alpha: 1.0
  verifier_score_beta: 1.0
  policy_prior_target: goal
  distance_mode: tokenwise
  latent_representation: grid
  max_history_steps: 128
  action_conditioning: action_token
  predict_delta: false
  dynamics_weighting: uniform
  affected_dynamics_weight: 32.0
  context_dynamics_weight: 2.0
  regularizer: sigreg
  use_ema_target_encoder: false
  ema_decay: 0.995
training:
  max_steps: 20000
  batch_size: 64
  gradient_accumulation_steps: 4
  oracle_probability: 0.5
  allow_overwrite: false
  editable_noise_probability: 0.0
  random_max_steps: null
  counterfactual_branches: 0
  counterfactual_depth: 1
  counterfactual_max_pairs: 0
  learning_rate: 1.0e-4
  warmup_steps: 1000
  min_lr_ratio: 0.1
  weight_decay: 1.0e-3
  grad_clip: 1.0
  bf16: true
  eval_every_steps: 1000
  save_every_steps: 5000
eval:
  diagnostic_examples: 32
  panel_examples: 3
  panel_steps: 5
  panel_actions: 6
  planner_examples: 16
  max_plan_steps: 81
