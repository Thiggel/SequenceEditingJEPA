seed: 1001
output_dir: ${oc.env:PUZZLE_JEPA_WORK_ROOT}/runs/grid5_sigreg_default
task:
  name: sudoku
  repo_id: sapientinc/sudoku-extreme
  train_split: train[:50000]
  eval_split: test[:1024]
  puzzle_column: question
  solution_column: answer
model:
  latent_size: 64
  encoder_type: mlp
  predictor_type: mlp
  predict_delta: false
  encoder_hidden_size: 256
  predictor_hidden_size: 256
  transformer_layers: 1
  predictor_layers: 1
  num_heads: 4
  max_height: 9
  max_width: 9
  action_value_vocab_size: 10
  action_size: 16
  max_rollout_steps: 8
  dropout: 0.0
  sigreg_weight: 1.0
  sigreg_projections: 64
  sigreg_knots: 16
  sigreg_knot_max: 5.0
training:
  max_steps: 5000
  batch_size: 512
  rollout_steps: 8
  rollout_oracle_probability: 0.5
  recursive_rollout_steps: 1
  recursive_rollout_weight: 0.0
  goal_energy_weight: 1.0
  learning_rate: 1.0e-4
  weight_decay: 0.05
  grad_clip: 1.0
  bf16: true
  eval_every_steps: 1000
  save_every_steps: 1000
eval:
  batch_size: 128
  rollout_oracle_probability: 1.0
  latent_examples: 64
  trajectory_examples: 32
  rank_examples: 32
  detail_examples: 4
  plan_examples: 16
  plan_beam_size: 4
  plan_branch_size: 8
  max_plan_steps: 96
