long:
  experiment:
    name: igsm_official_med_causal_lm_200k
    seed: 41
    device: auto
  task:
    name: official_igsm
    seed: 41
    eval_seed: 1041
    ood_seed: 7041
    seq_len: 1024
    max_length: 1024
    difficulty: med
    max_op: 15
    max_edge: 20
    perm_level: 5
    detail_level: 0
    p_format: pq
    compact_vocab: true
    compact_vocab_num_prescan_examples: 0
    builder_examples: 1024
    official_repo_path: ${oc.env:SEQ_EDIT_JEPA_WORK_ROOT}/external/iGSM
  model:
    type: causal_lm
    hidden_size: 256
    intermediate_size: 1024
    encoder_layers: 20
    num_heads: 8
    dropout: 0.1
  training:
    batch_size: 16
    max_steps: 200000
    save_steps: 20000
    save_total_limit: 5
    lr: 0.0003
    weight_decay: 0.01
    grad_clip: 1.0
    log_every: 500
    bf16: true
  eval:
    batches: 16
    batch_size: 8
    every_steps: 20000
    periodic_batches: 2
    extra_splits:
    - name: ood_op_20
      split: eval_op_20
      batches: 16
      periodic_batches: 2
    - name: ood_op_21
      split: eval_op_21
      batches: 16
      periodic_batches: 2
    - name: ood_op_22
      split: eval_op_22
      batches: 16
      periodic_batches: 2
    - name: ood_op_23
      split: eval_op_23
      batches: 16
      periodic_batches: 2
  hydra:
    run:
      dir: ${oc.env:SEQ_EDIT_JEPA_WORK_ROOT}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
    output_subdir: null
