long:
  experiment:
    name: lano_causal_lm_200k
    seed: 101
    device: auto
  task:
    name: lano
    seed: 101
    seq_len: 128
    max_depth: 6
    max_target_tokens: 126
  model:
    type: causal_lm
    hidden_size: 256
    intermediate_size: 1024
    encoder_layers: 20
    num_heads: 8
    dropout: 0.1
  training:
    batch_size: 128
    max_steps: 200000
    save_steps: 10000
    save_total_limit: 5
    lr: 0.0003
    weight_decay: 0.01
    grad_clip: 1.0
    log_every: 500
    bf16: true
  eval:
    batches: 16
    batch_size: 128
  hydra:
    run:
      dir: ${oc.env:SEQ_EDIT_JEPA_WORK_ROOT}/hydra/${now:%Y-%m-%d}/${now:%H-%M-%S}
    output_subdir: null
